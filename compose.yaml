services:
  keycloak:
    image: keycloak/keycloak:24.0
    hostname: keycloak
    ports:
      - "0.0.0.0:8080:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: password
    volumes:
      - ./docker/keycloak/realm:/opt/keycloak/data/import
    command: start-dev --import-realm

  postgres:
    image: postgres:17.7
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_PASSWORD: secret
      POSTGRES_USER: myuser
    ports:
      - '5432:5432'

  grafana-lgtm:
    image: grafana/otel-lgtm:0.17.1
    ports:
      - '3000:3000'
      - '4317'
      - '4318'

  ollama:
    image: ollama/ollama:0.17.7
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

volumes:
  ollama:
    external: true